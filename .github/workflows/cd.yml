name: Android CD

on:

permissions:
  contents: write
  push:
    branches: [main]

jobs:
  build:
    name: Test, build and distribute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload to Firebase App Distribution
        env:
          HAS_FIREBASE: ${{ secrets.FIREBASE_APP_ID != '' }}
        if: env.HAS_FIREBASE != ''
        uses: wzieba/firebase-distribution-github-action@v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: beta-testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Build ${{ github.run_number }}"

      - name: Generate release tag
        id: tag
        run: echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: |
            ## Build ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### Cambios
            ${{ github.event.head_commit.message }}
            
            ### Descargas
            - [APK Debug](app-debug.apk) — desarrollo
            - [APK Release](app-release-unsigned.apk) — produccion (sin firmar)
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: false
